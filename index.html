  <!-- Page Loader CSS (inline for immediate loading) -->
  <style>
    .page-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: var(--bg) !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
      overflow: hidden;
    }
    .page-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-container { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .spinner-square {
      width: 60px; height: 60px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-family: "Readex Pro", sans-serif;
      font-size: 1rem;
      color: var(--ink);
      letter-spacing: 0.05em;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" >
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin >
  <link
    href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Questrial&family=Readex+Pro:wght@200..400&display=swap"
    rel="stylesheet"
  >

  <!-- Alpine.js -->
  <script

  <script src="assets/js/data.js"></script>

</head>

    <div class="masthead-right">
      <div class="selectors">
        <div class="custom-select" x-data="themeSelector()" @click.outside="open = false">
          <div class="select-selected" :class="{ 'select-arrow-active': open }" @click="open = !open" tabindex="0">
            <span x-text="currentTheme"></span>
          </div>
          <div class="select-items" :class="{ 'select-show': open }">
            <template x-for="themeName in themes" :key="themeName">
              <div :class="{ 'same-as-selected': currentTheme === themeName }" @click="setCurrentTheme(themeName)" x-text="themeName"></div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </header>

        <a href="mailto:hello@lakubudavid.me" class="btn btn-stroke">Contact</a>
      </div>
    </div>
    <div class="hero-image">
      <div class="hero-image-inner" x-show="!loading">
        <img :src="profileImage.src || 'assets/img/profile.jpg'" :alt="profileImage.alt || 'profile picture'" style="width: 200px; height: 200px; border-radius: 50%; object-fit: cover;">
      </div>
      <div class="hero-image-inner" x-show="loading">
        <div class="hero-photo-placeholder"></div>
      </div>
    </div>
  </section>
