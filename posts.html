<!doctype html>
<html>
  <head>
    <title>David Lakubu - Blog</title>
    <link rel="stylesheet" href="assets/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- Alpine.js -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.4/dist/cdn.min.js"
    ></script>

    <!-- marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="assets/app-alpine.js"></script>
  </head>

  <body
    x-data="themeManager()"
    :class="themeClass"
    x-init="init(); $store.i18n.init()"
  >
    <main>
      <nav>
        <div class="selectors">
          <a href="index.html" class="back-link">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M19 12H5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M12 19L5 12L12 5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span x-text="i18n.t('backToHome')">Back to Home</span>
          </a>

          <!-- Theme Selector -->
          <div
            class="custom-select"
            x-data="themeSelector()"
            @click.outside="open = false"
          >
            <div
              class="select-selected"
              :class="{ 'select-arrow-active': open }"
              @click="open = !open"
              @keydown.enter="open = !open"
              @keydown.escape="open = false"
              tabindex="0"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
                style="
                  display: inline-block;
                  vertical-align: middle;
                  margin-right: 8px;
                  opacity: 0.7;
                "
              >
                <path
                  d="M12 3C10.8065 4.19347 10.136 5.81217 10.136 7.5C10.136 9.18783 10.8065 10.8065 12 12C13.1935 13.1935 13.8122 14.8065 13.8122 16.5C13.8122 18.1935 13.1935 19.8065 12 21"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M19 12C19 15.866 15.866 19 12 19C8.13401 19 5 15.866 5 12C5 8.13401 8.13401 5 12 5C15.866 5 19 8.13401 19 12Z"
                  stroke="currentColor"
                  stroke-width="2"
                />
              </svg>
              <span x-text="currentTheme"></span>
            </div>
            <div class="select-items" :class="{ 'select-show': open }">
              <template x-for="themeName in themes" :key="themeName">
                <div
                  :class="{ 'same-as-selected': currentTheme === themeName }"
                  @click="setCurrentTheme(themeName)"
                  x-text="themeName"
                ></div>
              </template>
            </div>
          </div>
        </div>
      </nav>

      <!-- Blog List / Post View -->
      <section id="blog" x-data="blogSection()">
        <template x-if="loading">
          <p x-text="i18n.t('loading')">Loading...</p>
        </template>

        <template x-if="!loading && !currentPostId">
          <div class="blog-list-container">
            <h1 x-text="i18n.t('blogArticles')">Blog Articles</h1>
            <div id="blogs-list">
              <template x-for="article in articles" :key="article.id">
                <div class="blog-list-item">
                  <div class="col">
                    <strong
                      ><a :href="'posts?blog_post=' + article.id" x-text="article.title"></a
                    ></strong>
                    <small x-text="formatDate(article.date)"></small>
                    <p class="blog-description" x-text="article.description"></p>
                  </div>
                </div>
              </template>
              <p x-show="articles.length === 0" x-text="i18n.t('noArticles')">
                No articles found.
              </p>
            </div>
          </div>
        </template>

        <template x-if="!loading && currentPostId">
          <div class="blog-post-container">
            <a href="posts" class="back-to-list">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M19 12H5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 19L5 12L12 5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span x-text="i18n.t('backToList')">Back to list</span>
            </a>
            <template x-if="postMetadata">
              <div class="post-header">
                <h1 x-text="postMetadata.title"></h1>
                <p class="post-date" x-text="formatDate(postMetadata.date)"></p>
              </div>
            </template>
            <article class="blog-post" x-html="renderedContent"></article>
          </div>
        </template>
      </section>
    </main>
  </body>
</html>
